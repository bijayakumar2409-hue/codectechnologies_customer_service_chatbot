<!DOCTYPE html>
<html>
<head>
    <title>Customer Service Chatbot</title>
</head>
<body>
    <h2>Customer Service Chatbot</h2>

    <form method="POST">
        <input type="text" name="message" placeholder="Type your message" required>
        <button type="submit">Send</button>
    </form>

    {% if reply %}
        <h3>Bot Reply:</h3>
        <p>{{ reply }}</p>
    {% endif %}

</body>
</html>
